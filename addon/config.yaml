name: My Recipe Manager
description: A family meal database and weekly meal planner.
version: "1.0.0"
slug: my_recipe_manager
url: https://github.com/craicoverflow/my-recipe-manager

# Supported architectures
arch:
  - aarch64
  - amd64
  - armv7

# Runtime
startup: application
boot: auto

# Ingress (HA panel)
ingress: true
ingress_port: 8099
panel_icon: mdi:food
panel_title: Recipe Manager

# Networking
ports:
  8099/tcp: null  # internal only; exposed via ingress

# Permissions
map:
  - data:rw

# AppArmor
apparmor: true
