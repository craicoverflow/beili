name: Béilí
description: A family meal database and weekly meal planner.
version: "1.4.3"
slug: beili
url: https://github.com/craicoverflow/beili

# Supported architectures
arch:
  - aarch64
  - amd64
  - armhf

# Runtime
startup: application
init: false
boot: auto

# Ingress (HA panel)
ingress: true
ingress_port: 8099
panel_icon: mdi:food
panel_title: Béilí

# Networking
ports:
  8099/tcp: null  # internal only; exposed via ingress

# Permissions
map:
  - data:rw

# User-configurable options
options:
  shopping_webhook_id: ""
  gemini_api_key: ""
  gemini_model: "gemini-2.5-flash"
  base_servings: 5

schema:
  shopping_webhook_id: str?
  gemini_api_key: str?
  gemini_model: str?
  base_servings: int?

# AppArmor
apparmor: false
