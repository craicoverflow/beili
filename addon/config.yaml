name: Béilí
description: A family meal database and weekly meal planner.
version: "1.0.9"
slug: beili
url: https://github.com/craicoverflow/beili

# Supported architectures
arch:
  - aarch64
  - amd64
  - armv7

# Runtime
startup: application
init: false
boot: auto

# Ingress (HA panel)
ingress: true
ingress_port: 8099
panel_icon: mdi:food
panel_title: Béilí

# Networking
ports:
  8099/tcp: null  # internal only; exposed via ingress

# Permissions
map:
  - data:rw

# AppArmor
apparmor: false
